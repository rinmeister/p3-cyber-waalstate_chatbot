---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waalstate-chatbot
  labels:
    app: waalstate-chatbot
spec:
  replicas: 5
  selector:
    matchLabels:
      app: waalstate-chatbot
  template:
    metadata:
      labels:
        app: waalstate-chatbot
    spec:
      containers:
        - name: waalstate-chatbot
          image: rinmeister/p3-cyber-waalstate_chatbot:latest
          ports:
            - containerPort: 4242
---

